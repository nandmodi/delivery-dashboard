<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f13;
    color: #e0e0e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .tab-bar {
    display: flex;
    gap: 8px;
    padding: 10px 12px 0;
    background: #0f0f13;
    border-bottom: 1px solid #2a2a35;
    flex-shrink: 0;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px 9px;
    background: #1c1c24;
    border: 1px solid #2e2e3a;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
    position: relative;
    top: 1px;
  }

  .tab:hover { background: #25252f; }

  .tab.active {
    background: #1a1a38;
    border-color: #4a4aff;
    border-bottom: 1px solid #1a1a38;
  }

  .tab-thumb {
    width: 28px;
    height: 20px;
    border-radius: 3px;
    object-fit: cover;
    object-position: top left;
    flex-shrink: 0;
    border: 1px solid #3a3a48;
    background: #2a2a38;
  }

  .tab-badge {
    display: none;
    width: 28px;
    height: 20px;
    border-radius: 3px;
    background: #2a2a60;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 700;
    color: #8080ff;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .tab-label {
    font-size: 12px;
    font-weight: 500;
    color: #a0a0b8;
    white-space: nowrap;
  }

  .tab.active .tab-label { color: #c8c8ff; }

  .tab-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4a4aff;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .tab.active .tab-dot { opacity: 1; }

  .frame-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #fff;
  }

  iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  iframe.active {
    opacity: 1;
    pointer-events: all;
  }

  .loading-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #0f0f13;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
    transition: opacity 0.3s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid #2a2a40;
    border-top-color: #4a4aff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 12px;
    color: #5050a0;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="tab-bar" id="tabBar"></div>

<div class="frame-container" id="frameContainer">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Loading sites…</div>
  </div>
</div>

<script>
const sites = [
  {
    label: '360 Tracker',
    url: 'https://360-tracker-dashboard.vercel.app/',
    thumb: 'https://360-tracker-dashboard.vercel.app/favicon.ico',
    fallback: '360'
  },
  {
    label: 'Master Catalogue',
    url: 'https://sumitrana-dotcom.github.io/Master-Catalogue/',
    thumb: 'https://sumitrana-dotcom.github.io/Master-Catalogue/favicon.ico',
    fallback: 'CAT'
  },
  {
    label: 'Data Report',
    url: 'https://data-report-ops.vercel.app/',
    thumb: 'https://data-report-ops.vercel.app/favicon.ico',
    fallback: 'VID'
  }
];

const tabBar = document.getElementById('tabBar');
const frameContainer = document.getElementById('frameContainer');
const loadingOverlay = document.getElementById('loadingOverlay');
const iframes = [];
const loadedCount = { n: 0 };

sites.forEach((site, i) => {
  const tab = document.createElement('div');
  tab.className = 'tab' + (i === 0 ? ' active' : '');

  const thumbImg = document.createElement('img');
  thumbImg.className = 'tab-thumb';
  thumbImg.alt = site.label;
  thumbImg.src = site.thumb;

  const badge = document.createElement('div');
  badge.className = 'tab-badge';
  badge.textContent = site.fallback;

  thumbImg.onerror = () => {
    thumbImg.style.display = 'none';
    badge.style.display = 'flex';
  };

  const label = document.createElement('span');
  label.className = 'tab-label';
  label.textContent = site.label;

  const dot = document.createElement('div');
  dot.className = 'tab-dot';

  tab.appendChild(thumbImg);
  tab.appendChild(badge);
  tab.appendChild(label);
  tab.appendChild(dot);
  tabBar.appendChild(tab);
  tab.addEventListener('click', () => switchTo(i));

  const frame = document.createElement('iframe');
  frame.src = site.url;
  frame.title = site.label;
  frame.className = i === 0 ? 'active' : '';
  frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups');
  frame.onload = () => {
    loadedCount.n++;
    if (loadedCount.n >= sites.length) loadingOverlay.classList.add('hidden');
  };
  frameContainer.appendChild(frame);
  iframes.push(frame);
});

function switchTo(index) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
  iframes.forEach((f, i) => f.classList.toggle('active', i === index));
}

switchTo(0);
</script>
</body>
</html>
