<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', 'Segoe UI', sans-serif;
    background: #e8eef5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .nav-bar {
    display: flex;
    align-items: flex-end;
    background: linear-gradient(180deg, #dce6f0 0%, #c8d8e8 100%);
    padding: 0 16px;
    height: 52px;
    flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(0,80,160,0.15);
    position: relative;
    z-index: 10;
  }

  .nav-tab {
    position: relative;
    display: flex;
    align-items: center;
    gap: 8px;
    height: 40px;
    padding: 0 20px;
    cursor: pointer;
    user-select: none;
    margin-right: 2px;
    clip-path: polygon(10px 0%, calc(100% - 10px) 0%, 100% 50%, calc(100% - 10px) 100%, 10px 100%, 0% 50%);
    background: linear-gradient(180deg, #b8cfe8 0%, #92b4d4 100%);
    transition: background 0.2s;
    min-width: 130px;
    justify-content: center;
  }

  .nav-tab:hover {
    background: linear-gradient(180deg, #7ab0d8 0%, #4d8ec4 100%);
  }

  .nav-tab.active {
    background: linear-gradient(180deg, #5ab0f0 0%, #1a7fd4 60%, #0d60b0 100%);
    height: 46px;
    z-index: 2;
  }

  .nav-tab.active::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 7px solid #1a7fd4;
  }

  .tab-thumb {
    width: 22px;
    height: 16px;
    border-radius: 2px;
    object-fit: cover;
    flex-shrink: 0;
    filter: brightness(0) invert(1);
    opacity: 0.85;
  }

  .tab-badge {
    display: none;
    width: 22px;
    height: 16px;
    border-radius: 2px;
    background: rgba(255,255,255,0.25);
    align-items: center;
    justify-content: center;
    font-size: 7px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .tab-label {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-shadow: 0 1px 2px rgba(0,40,100,0.4);
  }

  .nav-tab.active .tab-label {
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,60,160,0.5);
  }

  .frame-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #fff;
  }

  iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  iframe.active {
    opacity: 1;
    pointer-events: all;
  }

  .loading-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #dce6f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 10;
    transition: opacity 0.4s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 30px;
    height: 30px;
    border: 3px solid #b8cfe8;
    border-top-color: #1a7fd4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 13px;
    font-weight: 600;
    color: #4d8ec4;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="nav-bar" id="navBar"></div>

<div class="frame-container" id="frameContainer">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Loading…</div>
  </div>
</div>

<script>
const sites = [
  {
    label: '360 Tracker',
    url: 'https://360-tracker-dashboard.vercel.app/',
    thumb: 'https://360-tracker-dashboard.vercel.app/favicon.ico',
    fallback: '360'
  },
  {
    label: 'Website',
    url: 'https://sumitrana-dotcom.github.io/Master-Catalogue/',
    thumb: 'https://sumitrana-dotcom.github.io/Master-Catalogue/favicon.ico',
    fallback: 'WEB'
  },
  {
    label: 'Video',
    url: 'https://data-report-ops.vercel.app/',
    thumb: 'https://data-report-ops.vercel.app/favicon.ico',
    fallback: 'VID'
  }
];

const navBar = document.getElementById('navBar');
const frameContainer = document.getElementById('frameContainer');
const loadingOverlay = document.getElementById('loadingOverlay');
const iframes = [];
const loadedCount = { n: 0 };

sites.forEach((site, i) => {
  const tab = document.createElement('div');
  tab.className = 'nav-tab' + (i === 0 ? ' active' : '');

  const thumbImg = document.createElement('img');
  thumbImg.className = 'tab-thumb';
  thumbImg.alt = site.label;
  thumbImg.src = site.thumb;

  const badge = document.createElement('div');
  badge.className = 'tab-badge';
  badge.textContent = site.fallback;

  thumbImg.onerror = () => {
    thumbImg.style.display = 'none';
    badge.style.display = 'flex';
  };

  const label = document.createElement('span');
  label.className = 'tab-label';
  label.textContent = site.label;

  tab.appendChild(thumbImg);
  tab.appendChild(badge);
  tab.appendChild(label);
  navBar.appendChild(tab);
  tab.addEventListener('click', () => switchTo(i));

  const frame = document.createElement('iframe');
  frame.src = site.url;
  frame.title = site.label;
  frame.className = i === 0 ? 'active' : '';
  frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups');
  frame.onload = () => {
    loadedCount.n++;
    if (loadedCount.n >= sites.length) loadingOverlay.classList.add('hidden');
  };
  frameContainer.appendChild(frame);
  iframes.push(frame);
});

function switchTo(index) {
  document.querySelectorAll('.nav-tab').forEach((t, i) => t.classList.toggle('active', i === index));
  iframes.forEach((f, i) => f.classList.toggle('active', i === index));
}

switchTo(0);
</script>
</body>
</html>
