<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #eef1f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── top bar ── */
  .nav-wrap {
    flex-shrink: 0;
    background: linear-gradient(135deg, #1a2535 0%, #243248 60%, #1e3a52 100%);
    height: 52px;
    display: flex;
    align-items: flex-end;
    padding: 0 20px;
    gap: 0;
    position: relative;
    box-shadow: 0 3px 16px rgba(0,0,0,0.25);
  }

  /* subtle dot pattern overlay */
  .nav-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 18px 18px;
    pointer-events: none;
  }

  /* teal accent line at bottom */
  .nav-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #00c6d7, #0097b2, #00c6d7);
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }

  @keyframes shimmer {
    0%   { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
  }

  /* ── tab ── */
  .nav-tab {
    position: relative;
    display: flex;
    align-items: center;
    gap: 9px;
    height: 40px;
    padding: 0 24px;
    cursor: pointer;
    user-select: none;
    border-radius: 8px 8px 0 0;
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    color: rgba(255,255,255,0.45);
    transition: color 0.2s, background 0.2s, border-color 0.2s;
    z-index: 1;
  }

  .nav-tab:hover {
    color: rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.06);
  }

  .nav-tab.active {
    background: #eef1f5;
    border-color: rgba(0,198,215,0.3);
    color: #1a2535;
  }

  /* active tab bottom cover — hides the teal line behind it */
  .nav-tab.active::after {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 0; right: 0;
    height: 3px;
    background: #eef1f5;
    z-index: 3;
  }

  /* left color accent on active */
  .nav-tab.active::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 3px;
    border-radius: 0 2px 2px 0;
    background: linear-gradient(180deg, #00c6d7, #0097b2);
  }

  .tab-logo {
    height: 26px;
    width: auto;
    object-fit: contain;
    flex-shrink: 0;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.15));
    transition: transform 0.2s;
  }

  .nav-tab:hover .tab-logo {
    transform: scale(1.08);
  }

  .tab-icon {
    font-size: 15px;
    line-height: 1;
    opacity: 0.7;
    transition: opacity 0.2s, transform 0.2s;
  }

  .nav-tab.active .tab-icon {
    opacity: 1;
    color: #0097b2;
  }

  .nav-tab:hover .tab-icon {
    opacity: 1;
    transform: scale(1.1);
  }

  .tab-label {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }

  /* ── iframe area ── */
  .frame-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #fff;
  }

  iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  iframe.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ── loading screen ── */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #1a2535 0%, #1e3a52 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 10;
    transition: opacity 0.5s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loader-ring {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 3px solid rgba(0,198,215,0.15);
    border-top-color: #00c6d7;
    animation: spin 0.9s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 10px;
    font-weight: 700;
    color: rgba(0,198,215,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .loading-dots span {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #00c6d7;
    margin: 0 3px;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40%           { transform: scale(1);   opacity: 1; }
  }
</style>
</head>
<body>

<div class="nav-wrap" id="navBar"></div>

<div class="frame-container" id="frameContainer">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loader-ring"></div>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="loading-text">Loading</div>
  </div>
</div>

const navBar        = document.getElementById('navBar');
const frameContainer = document.getElementById('frameContainer');
const loadingOverlay = document.getElementById('loadingOverlay');
const iframes = [];
const loadedCount = { n: 0 };

sites.forEach((site, i) => {
  const tab = document.createElement('div');
  tab.className = 'nav-tab' + (i === 0 ? ' active' : '');

  let iconEl;
  if (site.logo) {
    iconEl = document.createElement('img');
    iconEl.src = site.logo;
    iconEl.className = 'tab-logo';
    iconEl.alt = site.label;
  } else {
    iconEl = document.createElement('span');
    iconEl.className = 'tab-icon';
    iconEl.textContent = site.icon;
  }
  const icon = iconEl;

  const label = document.createElement('span');
  label.className = 'tab-label';
  label.textContent = site.label;

  tab.appendChild(icon);
  tab.appendChild(label);
  navBar.appendChild(tab);
  tab.addEventListener('click', () => switchTo(i));

  const frame = document.createElement('iframe');
  frame.src = site.url;
  frame.title = site.label;
  frame.className = i === 0 ? 'active' : '';
  frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups');
  frame.onload = () => {
    loadedCount.n++;
    if (loadedCount.n >= sites.length) loadingOverlay.classList.add('hidden');
  };
  frameContainer.appendChild(frame);
  iframes.push(frame);
});

function switchTo(index) {
  document.querySelectorAll('.nav-tab').forEach((t, i) => t.classList.toggle('active', i === index));
  iframes.forEach((f, i) => f.classList.toggle('active', i === index));
}

switchTo(0);
